site_name: cimpl-azd
site_description: Azure Developer CLI deployment for CIMPL on AKS Automatic
site_url: https://danielscholl-osdu.github.io/cimpl-azd/
repo_name: danielscholl-osdu/cimpl-azd
repo_url: https://github.com/danielscholl-osdu/cimpl-azd
copyright: Copyright &copy; 2024-2026 cimpl-azd contributors
docs_dir: src


theme:
  name: material
  logo: https://upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Microsoft_Azure.svg/150px-Microsoft_Azure.svg.png
  favicon: https://upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Microsoft_Azure.svg/150px-Microsoft_Azure.svg.png
  font:
    text: Inter
    code: Fira Code
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.instant
    - navigation.instant.preview
    - navigation.expand
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - javascripts/tablesort.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - def_list
  - toc:
      permalink: true

plugins:
  - search
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Getting Started:
      - Prerequisites: getting-started/prerequisites.md
      - Quick Start: getting-started/quickstart.md
      - Configuration: getting-started/configuration.md
      - Feature Flags: getting-started/feature-flags.md
  - Design:
      - Overview: design/overview.md
      - Infrastructure: design/infrastructure.md
      - Platform Components: design/platform.md
      - Software Patterns: design/software.md
      - Request & Event Flow: design/data-flow.md
  - Services:
      - Overview: services/overview.md
      - Core Services: services/core.md
      - Reference & Domain: services/reference.md
  - Tutorials:
      - Deployment: tutorials/deployment.md
      - Debugging: tutorials/debugging.md
  - Operations:
      - CI/CD Pipelines: operations/pipelines.md
      - Troubleshooting: operations/troubleshooting.md
  - Decisions:
      - decisions/index.md
      - ADR-0001 AKS Automatic: decisions/0001-use-aks-automatic-as-deployment-target.md
      - ADR-0002 Helm Postrender: decisions/0002-helm-postrender-kustomize-for-safeguards.md
      - ADR-0003 RabbitMQ Manifests: decisions/0003-raw-manifests-for-rabbitmq.md
      - ADR-0004 Karpenter Stateful: decisions/0004-karpenter-for-stateful-workloads.md
      - ADR-0005 Two-Phase Gate: decisions/0005-two-phase-deployment-gate.md
      - ADR-0006 Two-Layer State: decisions/0006-two-layer-terraform-state.md
      - ADR-0007 ECK TLS: decisions/0007-eck-self-signed-tls-for-elasticsearch.md
      - ADR-0008 Istio Injection: decisions/0008-selective-istio-sidecar-injection.md
      - ADR-0009 Workload Identity: decisions/0009-workload-identity-for-dns-management.md
      - ADR-0010 Unique Selectors: decisions/0010-unique-service-selector-label-pattern.md
      - ADR-0011 Airflow Executor: decisions/0011-airflow-kubernetes-executor-with-nap.md
      - ADR-0012 Keycloak Chart: decisions/0012-bitnami-chart-with-official-keycloak-image.md
      - ADR-0013 Chart Defaults: decisions/0013-chart-default-images-over-explicit-overrides.md
      - ADR-0014 ROSA Alignment: decisions/0014-rosa-alignment-and-deliberate-differences.md
      - ADR-0015 OSDU Module: decisions/0015-osdu-service-module-and-sql-extraction.md
      - ADR-0016 Keycloak Manifests: decisions/0016-raw-manifests-for-keycloak.md
      - ADR-0017 Namespace Architecture: decisions/0017-consolidated-namespace-architecture.md
      - ADR-0018 File Layout: decisions/0018-stack-file-layout-reorganization.md
